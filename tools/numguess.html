<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Guess | Mini Tools</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Circle-icons-tools-light_blue.svg/960px-Circle-icons-tools-light_blue.svg.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --blue: rgb(1, 1, 179);
            --blue-dark: rgb(0, 0, 120);
            --blue-light: rgba(1, 1, 179, 0.08);
            --blue-glow: rgba(1, 1, 179, 0.25);
            --off-white: #f7f8ff;
            --text: #0d0d2b;
            --muted: #6b6b8a;
            --border: rgba(1, 1, 179, 0.15);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--off-white);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        ::selection { background: var(--blue); color: white; }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0; opacity: 0.4;
        }

        .page-wrapper {
            flex: 1; position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 20px 80px;
        }

        .page-title-wrap { text-align: center; margin-bottom: 40px; animation: fadeUp 0.5s ease both; }
        .page-eyebrow {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--blue-light); border: 1px solid var(--border);
            border-radius: 100px; padding: 6px 16px;
            font-size: 13px; font-weight: 500; color: var(--blue); letter-spacing: 0.5px; margin-bottom: 16px;
        }
        .page-eyebrow span { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; display: inline-block; }
        .page-title { font-family: 'Syne', sans-serif; font-size: clamp(32px, 5vw, 52px); font-weight: 800; letter-spacing: -2px; color: var(--text); line-height: 1; }
        .page-title .accent { color: var(--blue); }
        .page-subtitle { font-size: 15px; color: var(--muted); margin-top: 12px; }

        /* Card */
        .card {
            background: white; border: 1px solid var(--border); border-radius: 28px;
            padding: 36px; width: 100%; max-width: 440px;
            box-shadow: 0 20px 60px rgba(1,1,179,0.1); animation: fadeUp 0.5s 0.1s ease both;
        }

        /* Difficulty selector */
        .difficulty-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 28px;
        }
        .diff-btn {
            padding: 10px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--off-white); color: var(--muted);
            font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
            cursor: pointer; transition: 0.2s ease; text-align: center;
        }
        .diff-btn:hover { border-color: rgba(1,1,179,0.3); color: var(--blue); }
        .diff-btn.active { background: var(--blue); color: white; border-color: var(--blue); box-shadow: 0 4px 12px var(--blue-glow); }
        .diff-btn span { display: block; font-size: 11px; font-weight: 400; opacity: 0.8; margin-top: 2px; }

        /* Range display */
        .range-display {
            text-align: center;
            margin-bottom: 24px;
        }
        .range-text {
            font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
            color: var(--muted);
        }
        .range-text strong { color: var(--blue); }

        /* Chances bubbles */
        .chances-row {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 28px;
        }
        .chance-bubble {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--off-white);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
            color: var(--muted);
            transition: 0.3s ease;
        }
        .chance-bubble.used {
            background: rgba(220,38,38,0.1); border-color: rgba(220,38,38,0.4);
            color: rgb(220,38,38);
        }
        .chance-bubble.win {
            background: rgba(34,197,94,0.15); border-color: #22c55e;
            color: #22c55e;
        }

        /* Input */
        .guess-wrap {
            display: flex; gap: 10px; margin-bottom: 16px;
        }
        .guess-input {
            flex: 1; padding: 14px 18px;
            border: 1px solid var(--border); border-radius: 14px;
            font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700;
            color: var(--text); background: var(--off-white); outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            text-align: center;
        }
        .guess-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(1,1,179,0.1); background: white; }
        .guess-input:disabled { opacity: 0.5; cursor: not-allowed; }
        .guess-input::placeholder { color: rgba(1,1,179,0.25); font-size: 18px; }

        .guess-btn {
            padding: 14px 22px;
            background: var(--blue); color: white; border: none;
            border-radius: 14px;
            font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: 0.2s ease;
            box-shadow: 0 4px 14px var(--blue-glow);
        }
        .guess-btn:hover { background: var(--blue-dark); transform: translateY(-1px); }
        .guess-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Feedback */
        .feedback {
            min-height: 56px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
            text-align: center; padding: 12px 16px; margin-bottom: 16px;
            transition: all 0.3s ease;
            opacity: 0;
        }
        .feedback.show { opacity: 1; }
        .feedback.higher { background: rgba(59,130,246,0.1); color: rgb(37,99,235); border: 1px solid rgba(59,130,246,0.2); }
        .feedback.lower { background: rgba(249,115,22,0.1); color: rgb(194,65,12); border: 1px solid rgba(249,115,22,0.2); }
        .feedback.win { background: rgba(34,197,94,0.12); color: #15803d; border: 1px solid rgba(34,197,94,0.3); }
        .feedback.lose { background: rgba(220,38,38,0.08); color: rgb(185,28,28); border: 1px solid rgba(220,38,38,0.2); }

        /* History */
        .history-wrap { margin-bottom: 20px; }
        .history-label {
            font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
            color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
        }
        .history-pills { display: flex; flex-wrap: wrap; gap: 6px; }
        .history-pills span {
            padding: 4px 12px; border-radius: 100px;
            font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
            border: 1px solid var(--border);
        }
        .history-pills .high { background: rgba(249,115,22,0.1); color: rgb(194,65,12); border-color: rgba(249,115,22,0.2); }
        .history-pills .low { background: rgba(59,130,246,0.1); color: rgb(37,99,235); border-color: rgba(59,130,246,0.2); }
        .history-pills .win { background: rgba(34,197,94,0.15); color: #22c55e; border-color: #22c55e40; }

        /* Play again */
        .play-again-btn {
            width: 100%; padding: 14px;
            background: var(--off-white); color: var(--blue);
            border: 1px solid var(--border); border-radius: 14px;
            font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: 0.2s ease; display: none;
        }
        .play-again-btn:hover { background: var(--blue-light); border-color: rgba(1,179,0.3); }
        .play-again-btn.show { display: block; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>

    <div id="header"></div>

    <div class="page-wrapper">
        <div class="page-title-wrap">
            <div class="page-eyebrow"><span></span> Mini Tools</div>
            <h1 class="page-title">Number <span class="accent">Guess</span></h1>
            <p class="page-subtitle">Can you guess it? You only get 5 chances.</p>
        </div>

        <div class="card">
            <div class="difficulty-row">
                <button class="diff-btn active" id="diff-easy" onclick="setDifficulty('easy')">Easy<span>1 – 50</span></button>
                <button class="diff-btn" id="diff-medium" onclick="setDifficulty('medium')">Medium<span>1 – 100</span></button>
                <button class="diff-btn" id="diff-hard" onclick="setDifficulty('hard')">Hard<span>1 – 200</span></button>
            </div>

            <div class="range-display">
                <span class="range-text">Guess a number between <strong id="rangeMin">1</strong> and <strong id="rangeMax">50</strong></span>
            </div>

            <div class="chances-row" id="chancesRow"></div>

            <div class="guess-wrap">
                <input class="guess-input" type="number" id="guessInput" placeholder="?" min="1">
                <button class="guess-btn" id="guessBtn" onclick="makeGuess()">Guess</button>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="history-wrap" id="historyWrap" style="display:none;">
                <div class="history-label">Your Guesses</div>
                <div class="history-pills" id="historyPills"></div>
            </div>

            <button class="play-again-btn" id="playAgainBtn" onclick="newGame()">Play Again →</button>
        </div>
    </div>

    <div id="footer"></div>

<script>
    const difficulties = {
        easy:   { min: 1, max: 50,   chances: 5 },
        medium: { min: 1, max: 100,  chances: 5 },
        hard:   { min: 1, max: 200,  chances: 5 }
    };

    let currentDiff = 'easy';
    let secretNumber = 0;
    let chancesLeft = 5;
    let totalChances = 5;
    let guessHistory = [];
    let gameOver = false;

    function setDifficulty(diff) {
        currentDiff = diff;
        
        let buttons = document.querySelectorAll('.diff-btn');
        for (let i = 0; i < buttons.length; i++) {
            buttons[i].classList.remove('active');
        }
        
        document.getElementById('diff-' + diff).classList.add('active');
        newGame();
    }

    function newGame() {
        let cfg = difficulties[currentDiff];
        secretNumber = Math.floor(Math.random() * (cfg.max - cfg.min + 1)) + cfg.min;
        chancesLeft = cfg.chances;
        totalChances = cfg.chances;
        guessHistory = [];
        gameOver = false;

        document.getElementById('rangeMin').textContent = cfg.min;
        document.getElementById('rangeMax').textContent = cfg.max;
        document.getElementById('guessInput').value = '';
        document.getElementById('guessInput').min = cfg.min;
        document.getElementById('guessInput').max = cfg.max;
        document.getElementById('guessInput').disabled = false;
        document.getElementById('guessBtn').disabled = false;
        document.getElementById('historyWrap').style.display = 'none';
        document.getElementById('historyPills').innerHTML = '';
        document.getElementById('playAgainBtn').classList.remove('show');

        let feedback = document.getElementById('feedback');
        feedback.className = 'feedback';
        feedback.textContent = '';

        buildChances();
    }

    function buildChances() {
        let row = document.getElementById('chancesRow');
        row.innerHTML = '';
        for (let i = 0; i < totalChances; i++) {
            let bubble = document.createElement('div');
            bubble.className = 'chance-bubble';
            bubble.id = 'bubble-' + i;
            bubble.textContent = i + 1;
            row.appendChild(bubble);
        }
    }

    function makeGuess() {
        if (gameOver === true) {
            return;
        }
        
        let input = document.getElementById('guessInput');
        let val = parseInt(input.value);
        let cfg = difficulties[currentDiff];

        if (isNaN(val) || val < cfg.min || val > cfg.max) {
            input.classList.add('shake');
            setTimeout(function() { 
                input.classList.remove('shake'); 
            }, 400);
            showFeedback("Enter a number between " + cfg.min + " and " + cfg.max, 'higher');
            return;
        }

        guessHistory.push(val);
        let usedIndex = totalChances - chancesLeft;
        chancesLeft--;

        // Update bubble status
        let bubble = document.getElementById('bubble-' + usedIndex);
        if (bubble) {
            bubble.textContent = val;
            if (val === secretNumber) {
                bubble.classList.add('win');
            } else {
                bubble.classList.add('used');
            }
        }

        // Show history display
        document.getElementById('historyWrap').style.display = 'block';
        let pill = document.createElement('span');
        
        let pillType = '';
        let pillSymbol = '';
        if (val > secretNumber) {
            pillType = 'high';
            pillSymbol = ' ↑';
        } else if (val < secretNumber) {
            pillType = 'low';
            pillSymbol = ' ↓';
        } else {
            pillType = 'win';
            pillSymbol = ' ✓';
        }
        
        pill.className = pillType;
        pill.textContent = val + pillSymbol;
        document.getElementById('historyPills').appendChild(pill);

        // Win / Loss logic parsing
        if (val === secretNumber) {
            let suffix = '';
            if (guessHistory.length > 1) {
                suffix = 'es';
            }
            showFeedback("🎉 Yes! The number was " + secretNumber + "! You got it in " + guessHistory.length + " guess" + suffix + "!", 'win');
            endGame();
        } else if (chancesLeft === 0) {
            showFeedback("💀 Out of chances! The number was " + secretNumber + ".", 'lose');
            endGame();
        } else {
            let hint = '';
            let feedbackType = '';
            if (val < secretNumber) {
                hint = '📈 Too low! Go higher.';
                feedbackType = 'higher';
            } else {
                hint = '📉 Too high! Go lower.';
                feedbackType = 'lower';
            }
            
            let chanceWord = 'chances';
            if (chancesLeft === 1) {
                chanceWord = 'chance';
            }
            
            showFeedback(hint + " — " + chancesLeft + " " + chanceWord + " left.", feedbackType);
        }

        input.value = '';
        input.focus();
    }

    function showFeedback(msg, type) {
        let el = document.getElementById('feedback');
        el.className = 'feedback ' + type + ' show';
        el.textContent = msg;
    }

    function endGame() {
        gameOver = true;
        document.getElementById('guessInput').disabled = true;
        document.getElementById('guessBtn').disabled = true;
        document.getElementById('playAgainBtn').classList.add('show');
    }

    // Keydown processing
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (gameOver === false) {
                makeGuess();
            }
        }
    });

    newGame();

    // Template inclusion systems
    fetch("../header-footer/header.html")
        .then(function(res) { 
            return res.text(); 
        })
        .then(function(data) {
            document.getElementById("header").innerHTML = data;
            let hamburger = document.querySelector(".hamburger");
            let navMenu = document.querySelector(".nav-menu");
            if (hamburger) {
                hamburger.addEventListener("click", function() { 
                    hamburger.classList.toggle("active"); 
                    navMenu.classList.toggle("active"); 
                });
            }
            
            let navLinks = document.querySelectorAll(".nav-menu a");
            for (let i = 0; i < navLinks.length; i++) {
                navLinks[i].addEventListener("click", function() {
                    hamburger.classList.remove("active");
                    navMenu.classList.remove("active");
                });
            }
        });

    fetch("../header-footer/footer.html")
        .then(function(res) { 
            return res.text(); 
        })
        .then(function(data) { 
            document.getElementById("footer").innerHTML = data; 
        });
</script>
</body>
</html>
