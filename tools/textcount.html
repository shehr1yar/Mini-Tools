<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text Counter | Mini Tools</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Circle-icons-tools-light_blue.svg/960px-Circle-icons-tools-light_blue.svg.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --blue: rgb(1, 1, 179);
            --blue-dark: rgb(0, 0, 120);
            --blue-light: rgba(1, 1, 179, 0.08);
            --blue-glow: rgba(1, 1, 179, 0.25);
            --off-white: #f7f8ff;
            --text: #0d0d2b;
            --muted: #6b6b8a;
            --border: rgba(1, 1, 179, 0.15);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--off-white);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        ::selection { background: var(--blue); color: white; }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0; opacity: 0.4;
        }

        .page-wrapper {
            flex: 1; position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px 80px;
        }

        .page-title-wrap { text-align: center; margin-bottom: 40px; animation: fadeUp 0.5s ease both; }
        .page-eyebrow {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--blue-light); border: 1px solid var(--border);
            border-radius: 100px; padding: 6px 16px;
            font-size: 13px; font-weight: 500; color: var(--blue); letter-spacing: 0.5px; margin-bottom: 16px;
        }
        .page-eyebrow span { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; display: inline-block; }
        .page-title { font-family: 'Syne', sans-serif; font-size: clamp(32px, 5vw, 52px); font-weight: 800; letter-spacing: -2px; color: var(--text); line-height: 1; }
        .page-title .accent { color: var(--blue); }
        .page-subtitle { font-size: 15px; color: var(--muted); margin-top: 12px; }

        .card {
            background: white; border: 1px solid var(--border); border-radius: 28px;
            padding: 36px; width: 100%; max-width: 680px;
            box-shadow: 0 20px 60px rgba(1,1,179,0.1); animation: fadeUp 0.5s 0.1s ease both;
        }

        /* Stats grid — live at top */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        .stat-box {
            background: var(--off-white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .stat-box.highlight {
            border-color: rgba(1,1,179,0.3);
            box-shadow: 0 4px 16px rgba(1,1,179,0.08);
        }
        .stat-box-value {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--blue);
            letter-spacing: -0.5px;
            line-height: 1;
        }
        .stat-box-label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
        }

        .field-label {
            font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
            color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 10px; display: block;
        }
        .text-area {
            width: 100%;
            min-height: 220px;
            padding: 16px 20px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            line-height: 1.8;
            color: var(--text);
            background: var(--off-white);
            outline: none;
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 16px;
        }
        .text-area:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(1,1,179,0.1);
            background: white;
        }
        .text-area::placeholder { color: rgba(1,1,179,0.25); }

        /* Bottom actions row */
        .actions-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 11px 22px;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
            border: 1px solid var(--border);
        }
        .action-btn.primary {
            background: var(--blue); color: white; border-color: var(--blue);
            box-shadow: 0 4px 14px var(--blue-glow);
        }
        .action-btn.primary:hover { background: var(--blue-dark); transform: translateY(-1px); }
        .action-btn.secondary {
            background: var(--off-white); color: var(--muted);
        }
        .action-btn.secondary:hover { color: var(--blue); border-color: rgba(1,1,179,0.3); }
        .action-btn.danger {
            background: rgba(220,38,38,0.06); color: rgb(220,38,38);
            border-color: rgba(220,38,38,0.2);
        }
        .action-btn.danger:hover { background: rgba(220,38,38,0.12); }

        /* Extra stats strip */
        .extra-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .extra-stat {
            text-align: center;
        }
        .extra-stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
        }
        .extra-stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        @media (max-width: 560px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .extra-stats { grid-template-columns: repeat(3, 1fr); }
            .card { padding: 24px; }
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="header"></div>

    <div class="page-wrapper">
        <div class="page-title-wrap">
            <div class="page-eyebrow"><span></span> Mini Tools</div>
            <h1 class="page-title">Text <span class="accent">Counter</span></h1>
            <p class="page-subtitle">Know your essay length before your teacher does.</p>
        </div>

        <div class="card">
            <!-- Live stats -->
            <div class="stats-grid">
                <div class="stat-box" id="box-words">
                    <div class="stat-box-value" id="count-words">0</div>
                    <div class="stat-box-label">Words</div>
                </div>
                <div class="stat-box" id="box-chars">
                    <div class="stat-box-value" id="count-chars">0</div>
                    <div class="stat-box-label">Characters</div>
                </div>
                <div class="stat-box" id="box-chars-no-space">
                    <div class="stat-box-value" id="count-chars-no-space">0</div>
                    <div class="stat-box-label">No Spaces</div>
                </div>
                <div class="stat-box" id="box-sentences">
                    <div class="stat-box-value" id="count-sentences">0</div>
                    <div class="stat-box-label">Sentences</div>
                </div>
            </div>

            <label class="field-label">Paste or type your text</label>
            <textarea class="text-area" id="textArea" placeholder="Start typing or paste your text here..."></textarea>

            <div class="actions-row">
                <button class="action-btn primary" onclick="copyText()">Copy Text</button>
                <button class="action-btn secondary" onclick="copyStats()">Copy Stats</button>
                <button class="action-btn danger" onclick="clearText()">Clear</button>
            </div>

            <div class="extra-stats">
                <div class="extra-stat">
                    <div class="extra-stat-value" id="count-paragraphs">0</div>
                    <div class="extra-stat-label">Paragraphs</div>
                </div>
                <div class="extra-stat">
                    <div class="extra-stat-value" id="count-lines">0</div>
                    <div class="extra-stat-label">Lines</div>
                </div>
                <div class="extra-stat">
                    <div class="extra-stat-value" id="count-read-time">0 min</div>
                    <div class="extra-stat-label">Read Time</div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

<script>
    const textArea = document.getElementById('textArea');

    textArea.addEventListener('input', updateCounts);

    function updateCounts() {
        const text = textArea.value;

        const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        const chars = text.length;
        const charsNoSpace = text.replace(/\s/g, '').length;
        const sentences = text.trim() === '' ? 0 : (text.match(/[^.!?]*[.!?]+/g) || []).length;
        const paragraphs = text.trim() === '' ? 0 : text.split(/\n\s*\n/).filter(p => p.trim() !== '').length;
        const lines = text.trim() === '' ? 0 : text.split('\n').length;
        const readTime = Math.ceil(words / 200); // avg 200 wpm

        document.getElementById('count-words').textContent = words.toLocaleString();
        document.getElementById('count-chars').textContent = chars.toLocaleString();
        document.getElementById('count-chars-no-space').textContent = charsNoSpace.toLocaleString();
        document.getElementById('count-sentences').textContent = sentences.toLocaleString();
        document.getElementById('count-paragraphs').textContent = paragraphs.toLocaleString();
        document.getElementById('count-lines').textContent = lines.toLocaleString();
        document.getElementById('count-read-time').textContent = readTime < 1 ? '< 1 min' : readTime + ' min';

        ['words','chars','chars-no-space','sentences'].forEach(id => {
            const val = parseInt(document.getElementById('count-' + id).textContent.replace(/,/g,''));
            document.getElementById('box-' + id).classList.toggle('highlight', val > 0);
        });
    }

    function copyText() {
        const text = textArea.value;
        if (!text) return;
        navigator.clipboard.writeText(text);
    }

    function copyStats() {
        const stats = `Words: ${document.getElementById('count-words').textContent}
Characters: ${document.getElementById('count-chars').textContent}
Characters (no spaces): ${document.getElementById('count-chars-no-space').textContent}
Sentences: ${document.getElementById('count-sentences').textContent}
Paragraphs: ${document.getElementById('count-paragraphs').textContent}
Lines: ${document.getElementById('count-lines').textContent}
Read time: ${document.getElementById('count-read-time').textContent}`;
        navigator.clipboard.writeText(stats);
    }

    function clearText() {
        textArea.value = '';
        updateCounts();
    }

    fetch("../header-footer/header.html").then(res => res.text()).then(data => {
        document.getElementById("header").innerHTML = data;
        const hamburger = document.querySelector(".hamburger");
        const navMenu = document.querySelector(".nav-menu");
        if (hamburger) {
            hamburger.addEventListener("click", () => { hamburger.classList.toggle("active"); navMenu.classList.toggle("active"); });
        }
        document.querySelectorAll(".nav-menu a").forEach(n => n.addEventListener("click", () => { hamburger.classList.remove("active"); navMenu.classList.remove("active"); }));
    });
    fetch("../header-footer/footer.html").then(res => res.text()).then(data => { document.getElementById("footer").innerHTML = data; });
</script>
</body>
</html>
